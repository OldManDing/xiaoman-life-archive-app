name: Regression Baseline

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  regression-baseline:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: xiaoman_archive
          MYSQL_USER: xiaoman
          MYSQL_PASSWORD: password
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production template
        run: npm run verify:production-template

      - name: Validate production compose
        run: docker compose -f deploy/docker-compose.prod.yml --env-file .env.example config --quiet

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Run regression baseline
        run: npm run regression:baseline

      - name: Build API
        run: npm run build:api

      - name: Build Web
        run: npm run build:web

      - name: Build Admin
        run: npm run build:admin

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run app/admin E2E
        run: npm run test:e2e
        env:
          DATABASE_URL: mysql://xiaoman:password@127.0.0.1:3307/xiaoman_archive

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
