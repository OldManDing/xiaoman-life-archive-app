services:
  mysql:
    image: mysql:8.0
    container_name: xiaoman-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: xiaoman_archive
      MYSQL_USER: xiaoman
      MYSQL_PASSWORD: password
    ports:
      - '3307:3306'
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: xiaoman-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: xiaoman-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ':9001'
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: xiaoman-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb --ignore-existing local/xiaoman-archive-local;
      mc anonymous set download local/xiaoman-archive-local;
      "

volumes:
  mysql-data:
  redis-data:
  minio-data:
